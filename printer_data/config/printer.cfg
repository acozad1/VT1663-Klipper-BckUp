[include mainsail.cfg]
[include sensorless.cfg]
[include rainbow_barf.cfg]
[include gcode_macro.cfg]
[gcode_arcs]
[exclude_object]
[include K-ShakeTune/*.cfg]
[include KAMP_Settings.cfg]
[include bed_fans.cfg]
[include motors_sync.cfg]

#####################################################################
# MCU SETUP Manta M8P
#####################################################################
[mcu] # Manta M8P motherboard 
canbus_uuid: cb9835247d75

[mcu cm4]
serial: /tmp/klipper_host_mcu

#[mcu H36_combo] # Fystec H36 Dragon Ace
#canbus_uuid: 9a3916c3c2c6

[mcu H36_combo] # Fystec H36 Heatcore 4
canbus_uuid: a528a13870ed

#[mcu cartographer]
#canbus_uuid: c01820d33e9d

[mcu cartographer] #v4
canbus_uuid: 854d252fad15

#####################################################################
# KLIPPER SCREEN
#####################################################################

[virtual_sdcard]
path: ~/printer_data/gcodes
[display_status]
[pause_resume]

#####################################################################
# PRINTER DEFINITIONS
#####################################################################

[printer]
kinematics: corexy
max_velocity: 600
max_accel: 30000
minimum_cruise_ratio: 0.0
max_z_velocity: 10
max_z_accel: 100
square_corner_velocity: 15

[firmware_retraction]
retract_length: 0.6
retract_speed: 85 
unretract_speed: 80

[shaketune]
result_folder: ~/printer_data/config/ShakeTune_results
number_of_results_to_keep: 3
#keep_raw_csv: False
show_macros_in_webui: True
timeout: 300

#####################################################################
# Cartpgrapher Probe
#####################################################################
[cartographer]
mcu: cartographer           
#   Offsets are measured from the centre of your coil, to the tip of your nozzle 
#   on a level axis. It is vital that this is accurate. 
x_offset: 0                          
#    adjust for your cartographers offset from nozzle to middle of coil
y_offset: 17                         
#    adjust for your cartographers offset from nozzle to middle of coil

[temperature_sensor cartographer]
sensor_type: temperature_mcu
sensor_mcu: cartographer
min_temp: 5
max_temp: 105

# CARTOGRAPHER_TOUCH_CALIBRATE SUCCESS_RATE=0.99

#################################################################################
# BED MESH
#################################################################################

[bed_mesh]
zero_reference_position: 150, 150
speed: 400
horizontal_move_z: 10
mesh_min: 35,26
mesh_pps: 1,1
mesh_max: 270, 258
probe_count: 15,15
algorithm: bicubic

[input_shaper]
##  A frequency (in Hz) of the input shaper for X or Y axis. 
shaper_type_x: mzv
shaper_freq_x: 103.8
shaper_type_y: mzv
shaper_freq_y: 83.8
#damping_ratio_x: 0.044
#damping_ratio_y: 0.044

#[adxl345] # Fystec H36_combo
#cs_pin: H36_combo:PB12
#spi_software_sclk_pin: H36_combo:PB10
#spi_software_mosi_pin: H36_combo:PB11
#spi_software_miso_pin: H36_combo:PB2
#axes_map: -y,z,-x

[adxl345] # Cartographer accelerometer
#cs_pin: cartographer:PA3 # For Cartographer V3
cs_pin: cartographer:PA0 # For Cartographer V4
spi_bus: spi1
axes_map: z,y,x 

[resonance_tester]
accel_chip: adxl345
probe_points:
    150, 150, 20
    
[idle_timeout]
timeout: 1800

#####################################################################
# X/Y STEPPER SETTINGS
#####################################################################

## X Stepper on Motor2 (A Motor)
[stepper_x]
step_pin: PB8
dir_pin: PB7
enable_pin: !PE0
microsteps: 32
rotation_distance: 40  
endstop_pin: tmc2240_stepper_x:virtual_endstop
position_min: 0
position_endstop: 300
position_max: 300
homing_speed: 250  #Max 100
homing_retract_dist: 5
#homing_positive_dir: true

[tmc2240 stepper_x]
cs_pin: PB9
spi_speed: 4000000
spi_software_miso_pin: PG7
spi_software_mosi_pin: PG6
spi_software_sclk_pin: PG8
diag0_pin: ^!PF2 # diag1 5160
#sense_resistor: 0.075
rref: 12000
interpolate: False
run_current: 1.6
driver_SLOPE_CONTROL: 3
stealthchop_threshold: 0
driver_SGT: -6

[stepper_x1]
step_pin: PB4
dir_pin: !PB3
enable_pin: !PB6
microsteps: 32
rotation_distance: 40 
endstop_pin: tmc2240_stepper_x:virtual_endstop

[tmc2240 stepper_x1]
cs_pin: PB5
spi_speed: 4000000
spi_software_miso_pin: PG7
spi_software_mosi_pin: PG6
spi_software_sclk_pin: PG8
diag0_pin: ^!PF1 # diag1 5160
#sense_resistor: 0.075
rref: 12000
interpolate: False
run_current: 1.6
driver_SLOPE_CONTROL: 3
stealthchop_threshold: 0
driver_SGT: -6

## Y Stepper on Motor1 (B Motor)
[stepper_y]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 32
rotation_distance: 40
endstop_pin: tmc2240_stepper_y:virtual_endstop
position_min: 0
position_endstop: 300
position_max: 300
homing_speed: 250 # Max 100  
homing_retract_dist: 5
#homing_positive_dir: true

[tmc2240 stepper_y]
cs_pin: PC13
spi_speed: 4000000
spi_software_miso_pin: PG7
spi_software_mosi_pin: PG6
spi_software_sclk_pin: PG8
diag0_pin: ^!PF4 # diag1 5160
#sense_resistor: 0.075
rref: 12000
interpolate: False
run_current: 1.6
driver_SLOPE_CONTROL: 3
stealthchop_threshold: 0
driver_SGT: -6

[stepper_y1]
step_pin: PE2
dir_pin: !PE1
enable_pin: !PE4
microsteps: 32
rotation_distance: 40
endstop_pin: tmc2240_stepper_y:virtual_endstop

[tmc2240 stepper_y1]
cs_pin: PE3
spi_speed: 4000000
spi_software_miso_pin: PG7
spi_software_mosi_pin: PG6
spi_software_sclk_pin: PG8
diag0_pin: ^!PF3 # diag1 5160
#sense_resistor: 0.075
rref: 12000
interpolate: False
run_current: 1.6
driver_SLOPE_CONTROL: 3
stealthchop_threshold: 0
driver_SGT: -6

#####################################################################
# Z STEPPER SETTINGS
#####################################################################

[stepper_z] # left lead screw
step_pin: PG13
dir_pin: PG12
enable_pin: !PG15
rotation_distance: 2 
microsteps: 32
endstop_pin: probe:z_virtual_endstop # uses cartographer as virtual endstop
position_max: 220
position_min: -8 # -2.5
homing_speed: 10.0 
second_homing_speed: 3
homing_retract_dist: 0 # cartographer needs this to be set to 0

[tmc2209 stepper_z]
uart_pin: PG14
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

[stepper_z1] # center lead screw
step_pin: PG9
dir_pin: PD7
enable_pin: !PG11
rotation_distance: 2
microsteps: 32

[tmc2209 stepper_z1] 
uart_pin: PG10
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

[stepper_z2] # right lead screw
step_pin: PD4
dir_pin: PD3
enable_pin: !PD6
rotation_distance: 2
microsteps: 32

[tmc2209 stepper_z2]
uart_pin: PD5
interpolate: true
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
# EXTRUDER
#####################################################################

[extruder]
step_pin: H36_combo: PB9 
dir_pin: H36_combo: PB8
enable_pin: !H36_combo: PB7
rotation_distance: 33.186011767874        # SBG2 45.6094368 # stock 47.088
gear_ratio: 9:1
microsteps: 16
full_steps_per_rotation: 200    #200 for 1.8 degree, 400 for 0.9 degree
nozzle_diameter: 0.400
filament_diameter: 1.75
pressure_advance: 0.040
pressure_advance_smooth_time: 0.02
max_extrude_only_distance: 500.0
max_extrude_cross_section: 10
heater_pin: H36_combo: PA7
sensor_type: PT1000
sensor_pin: H36_combo: PA6
pullup_resistor: 2200
min_temp: -20
max_temp: 360
max_power: 1.0
min_extrude_temp: 150
max_extrude_cross_section: 5000.0

#[verify_heater extruder]
#max_error: 240
#check_gain_time: 80
#hysteresis: 5
#heating_gain: 2

[tmc2209 extruder]
uart_pin: H36_combo: PC14
interpolate: false
run_current: 0.70
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
# Z TILT
#####################################################################

[z_tilt]
z_positions:
    -50, 18
    150, 348
    350, 18
points:
    30, 5
    150, 245
    270, 5
speed: 350
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0075 

#####################################################################
# BED HEATER
#####################################################################

[heater_bed]
heater_pin: PA0 #HE0 connect
sensor_pin: PB1 # TB
sensor_type: Generic 3950 
max_power: 1
#control: watermark
min_temp: 0
max_temp: 115

#####################################################################
# THERMISTOR SETTINGS
#####################################################################

[temperature_sensor CM4_MCU]
sensor_type: temperature_host
min_temp: -10
max_temp: 90

[temperature_sensor Manta_M8P_MCU]
sensor_type: temperature_mcu
sensor_mcu: mcu
min_temp: -10
max_temp: 80

[temperature_sensor chamber_temperature]
sensor_type: Generic 3950
sensor_pin: PC5
#min_temp: 0
#max_temp: 100
#gcode_id: C

[temperature_sensor H36_combo_MCU]
sensor_type: temperature_mcu
sensor_mcu: H36_combo
min_temp: -10
max_temp: 100

[temperature_sensor DriverH36_Temp]
sensor_type: Generic 3950
sensor_pin: H36_combo: PA3
min_temp:0
max_temp:150

#####################################################################
# FAN CONTROL
#####################################################################

[duplicate_pin_override]
pins: PB0

[heater_fan hotend_fan] # Hotend Fan
pin: H36_combo:PA9
max_power:1.0
shutdown_speed:0.0
cycle_time:0.5
hardware_pwm:false
kick_start_time:0.10
tachometer_pin: H36_combo:PC6
heater: extruder
heater_temp: 50.0
shutdown_speed: 1.0

[fan]
pin: H36_combo:PB13 # Part Cooling Fan
max_power:1.0
shutdown_speed:0.0
cycle_time:0.5
hardware_pwm:false
kick_start_time:0.10

[multi_pin basement_fans]
pins: PA2, PA6

[heater_fan basement_fans] #basement fans (noctoa)
pin: multi_pin:basement_fans
tachometer_pin: PC2
cycle_time: 0.0100
shutdown_speed: 0
kick_start_time: 0.5             # start-up time (Please do not change)
heater: heater_bed               # Related equipment: heater_bed
heater_temp: 50                  # How many degrees does the heat bed reach to activate the fan
fan_speed: 0.90                  # Fan speed

[controller_fan stepper_fans]    # Driver cooling fan
pin: PF9                         # Fan pin 
cycle_time: 0.00003              # Cycle time
max_power: 1.0                   # Maximum power
shutdown_speed: 0.0              # Shutdown speed
fan_speed: 1.0                   # Fan speed when heater or stepper driver is active (0.0 to 1.0). Default is 1.0.
idle_timeout: 180                # Time in seconds to keep the fan running after the stepper driver or heater is no longer active. Default is 180 seconds 3 minutes.
idle_speed: 0.5                  # Fan speed after the stepper driver is no longer active and before idle_timeout is reached (0.0 to 1.0). Default is fan_speed.
stepper: stepper_x               # Active motors

[temperature_fan cm4_mcu_fan]
pin: PF6
cycle_time: 0.0100
hardware_pwm: false 
max_power: .5
max_speed: .5
min_speed: 0
shutdown_speed: 0
sensor_type: temperature_host
min_temp: -10
max_temp: 90
control: pid
pid_Kp: 4.0
pid_Ki: 1
pid_Kd: 0.2
pid_deriv_time: 2.0
target_temp: 50.0
max_speed: 1.0
min_speed: 0.0


#######################################################################
## Nevermore V6
#######################################################################
[output_pin nevermore]
pin: PF7
value: 0
shutdown_value: 0

